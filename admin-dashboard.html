<script>


// Load registered client

let clientData = localStorage.getItem("clientData");


let client = null;


if(clientData){

client = JSON.parse(clientData);


document.getElementById("totalClients").innerHTML="1";



document.getElementById("clientList").innerHTML=`

<tr>

<td>${client.fullname}</td>

<td>${client.phone}</td>

<td>${client.nationalID}</td>

<td>${client.occupation}</td>

</tr>

`;

}







// Load pending loan application


let application = localStorage.getItem("loanApplication");



if(application){



let loan = JSON.parse(application);





if(loan.status==="PENDING"){



document.getElementById("pendingLoans").innerHTML="1";





document.getElementById("loanApplications").innerHTML=`


<tr>


<td>

${client ? client.fullname : ""}

</td>



<td>

KES ${loan.amount}

</td>



<td>

KES ${loan.interest}

</td>



<td>

${loan.reason}

</td>



<td>


<button 

onclick="approveLoan()"

class="btn btn-success btn-sm">

Approve

</button>



<button 

onclick="rejectLoan()"

class="btn btn-danger btn-sm">

Reject

</button>


</td>



</tr>


`;



}


}








// APPROVE LOAN


function approveLoan(){



let loanApplication = JSON.parse(

localStorage.getItem("loanApplication")

);




let today = new Date();




let approvedLoan = {



amount:Number(loanApplication.amount),



originalPrincipal:Number(loanApplication.amount),



remainingPrincipal:Number(loanApplication.amount),



principalPaid:0,



interestRate:20,



monthlyInterest:

Number(loanApplication.amount) * 0.20,



reason:

loanApplication.reason,



status:"ACTIVE",



loanTakenDate:

today.toLocaleDateString(),



dueDate:

"Manual Interest Payment",




transactions:[



{


date:

today.toLocaleDateString(),



description:

"Loan Approved",



amount:

Number(loanApplication.amount),



status:

"Approved"



}



]



};








localStorage.setItem(

"clientLoan",

JSON.stringify(approvedLoan)

);






localStorage.removeItem(

"loanApplication"

);






alert(

"Loan approved successfully"

);





location.reload();



}









// REJECT LOAN


function rejectLoan(){



let loanApplication = JSON.parse(

localStorage.getItem("loanApplication")

);




loanApplication.status="REJECTED";





localStorage.setItem(

"loanApplication",

JSON.stringify(loanApplication)

);





alert(

"Loan application rejected"

);





location.reload();



}







</script>
