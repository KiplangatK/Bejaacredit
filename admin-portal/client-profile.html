<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>
Bejja Credit | Client Profile
</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">


<style>

body{
    background:#f5f7fb;
}

.sidebar{

width:250px;
height:100vh;
position:fixed;
background:#062b45;
color:white;

}

.sidebar h3{

padding:20px;
color:#28a745;

}

.sidebar a{

display:block;
padding:14px 20px;
text-decoration:none;
color:white;

}

.sidebar a:hover{

background:#0b466b;

}

.main{

margin-left:250px;
padding:30px;

}


.profile-card{

border-radius:15px;
border:none;

}


.profile-img{

width:120px;
height:120px;
border-radius:50%;
object-fit:cover;

}


.document-img{

width:100%;
height:220px;
object-fit:cover;
border-radius:10px;

}

</style>

</head>


<body>


<div class="sidebar">


<h3>
Bejja Credit
</h3>


<a href="admin-dashboard.html">
Dashboard
</a>


<a href="registered-clients.html">
Registered Clients
</a>


<a href="active-loans.html">
Active Loans
</a>


<a href="loan-applications.html">
Loan Applications
</a>


</div>




<div class="main">


<div class="d-flex justify-content-between">


<h2>
Client Profile
</h2>


<a href="registered-clients.html"
class="btn btn-secondary">

Back

</a>


</div>



<div id="profileArea"></div>


</div>




<!-- DATABASE -->
    
<script src="../assets/js/database.js"></script>



<script>


document.addEventListener("DOMContentLoaded",function(){



const clientID =
localStorage.getItem("selectedClient");



console.log(
"Selected Client ID:",
clientID
);



function loadClient(){



const client =
DB.getClientById(clientID);



console.log(
"Found Client:",
client
);



if(!client){


document.getElementById("profileArea").innerHTML=

`

<div class="alert alert-danger">

Client not found.

<br>

Selected ID:
${clientID}

</div>

`;


return;


}




const photo =

client.profilePhoto

?

client.profilePhoto

:

"../assets/images/avatar.png";






document.getElementById("profileArea").innerHTML =



`


<div class="card profile-card p-4 mt-4">


<div class="row">


<div class="col-md-3 text-center">


<img src="${photo}"
class="profile-img">


<h4 class="mt-3">

${client.fullname}

</h4>


<span class="badge bg-success">

${client.status}

</span>


</div>





<div class="col-md-9">


<h4>
Personal Information
</h4>


<hr>



<div class="row">


<div class="col-md-6">


<p>
<b>National ID:</b>
${client.nationalID || "-"}
</p>


<p>
<b>Phone:</b>
${client.phone || "-"}
</p>


<p>
<b>Email:</b>
${client.email || "-"}
</p>



</div>




<div class="col-md-6">


<p>
<b>County:</b>
${client.county || "-"}
</p>


<p>
<b>Address:</b>
${client.address || "-"}
</p>


<p>
<b>Date Registered:</b>
${client.createdAt || "-"}
</p>


</div>


</div>


</div>


</div>


</div>






<div class="card p-4 mt-4">


<h4>
Employment Details
</h4>


<hr>


<div class="row">


<div class="col-md-6">


<p>

<b>Occupation:</b>

${client.occupation || "-"}

</p>


<p>

<b>Employer:</b>

${client.employer || "-"}

</p>


</div>



<div class="col-md-6">


<p>

<b>Monthly Income:</b>

KES ${Number(client.monthlyIncome || 0)
.toLocaleString()}

</p>


</div>


</div>


</div>






<div class="card p-4 mt-4">


<h4>
Identification Documents
</h4>


<hr>


<div class="row">


<div class="col-md-6">


<h6>
ID Front
</h6>


<img src="${client.idFront}"
class="document-img">


</div>





<div class="col-md-6">


<h6>
ID Back
</h6>


<img src="${client.idBack}"
class="document-img">


</div>


</div>


</div>






<div class="card p-4 mt-4">


<h4>
Loan Summary
</h4>


<hr>


<div class="row text-center">


<div class="col-md-4">

<h3>
0
</h3>

<p>
Total Loans
</p>

</div>



<div class="col-md-4">

<h3>
KES 0
</h3>

<p>
Total Borrowed
</p>

</div>



<div class="col-md-4">

<h3>
KES 0
</h3>

<p>
Current Balance
</p>

</div>


</div>


</div>




<div class="mt-4">


<button class="btn btn-success">

Create Loan

</button>



<button class="btn btn-warning">

Edit Client

</button>



<button class="btn btn-danger">

Delete Client

</button>



</div>



`;



}



loadClient();



});



</script>


</body>

</html>
