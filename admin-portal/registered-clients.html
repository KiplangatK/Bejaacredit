<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>
Bejja Credit | Registered Clients
</title>


<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">


<style>


body{

background:#f5f7fb;

}



.sidebar{

width:250px;
height:100vh;
position:fixed;
background:#062b45;
color:white;

}



.sidebar h3{

padding:20px;
color:#28a745;

}



.sidebar a{

display:block;
padding:14px 20px;
color:white;
text-decoration:none;

}



.sidebar a:hover{

background:#0b466b;

}



.main{

margin-left:250px;
padding:30px;

}



.card{

border:none;
border-radius:15px;

}



.table{

vertical-align:middle;

}


</style>


</head>




<body>




<!-- SIDEBAR -->


<div class="sidebar">


<h3>
Bejja Credit
</h3>



<a href="admin-dashboard.html">
Dashboard
</a>


<a href="registered-clients.html">
Registered Clients
</a>


<a href="active-loans.html">
Active Loans
</a>


<a href="loan-applications.html">
Loan Applications
</a>



</div>








<!-- MAIN CONTENT -->


<div class="main">



<div class="d-flex justify-content-between align-items-center">


<h2>
Registered Clients
</h2>


<span class="badge bg-success">

Clients Management

</span>


</div>







<div class="card p-4 mt-4">





<input 
type="text"
id="searchClient"
class="form-control mb-3"
placeholder="Search by name, National ID or phone..."
>







<div class="table-responsive">


<table class="table table-hover">


<thead class="table-dark">


<tr>


<th>
Name
</th>



<th>
National ID
</th>



<th>
Phone
</th>



<th>
County
</th>



<th>
Monthly Income
</th>



<th>
Registered Date
</th>



<th>
View Details
</th>



</tr>



</thead>



<tbody id="clientsTable">


</tbody>



</table>



</div>



</div>



</div>








<script src="../assets/js/database.js"></script>





<script>



let clients=[];





function loadClients(){


clients = DB.getClients();


displayClients(clients);


}








function displayClients(data){


let table =
document.getElementById("clientsTable");



table.innerHTML="";






if(data.length===0){


table.innerHTML=`

<tr>

<td colspan="7"
class="text-center">

No registered clients found

</td>

</tr>


`;

return;


}






data.forEach(client => {



table.innerHTML +=



`

<tr>


<td>

${client.fullname}

</td>



<td>

${client.nationalID}

</td>



<td>

${client.phone}

</td>



<td>

${client.county}

</td>




<td>

KES ${Number(client.monthlyIncome).toLocaleString()}

</td>




<td>

${client.date || "N/A"}

</td>




<td>


<button

class="btn btn-success btn-sm"

onclick="viewClient('${client.id}')"

>

View Details

</button>


</td>




</tr>


`;



});



}









function viewClient(id){



localStorage.setItem(

"selectedClient",

id

);



window.location.href =
"client-profile.html";



}









document
.getElementById("searchClient")
.addEventListener("keyup",function(){



let search =
this.value.toLowerCase();






let filtered =
clients.filter(client =>



client.fullname
.toLowerCase()
.includes(search)



||



client.nationalID
.toLowerCase()
.includes(search)



||



client.phone
.toLowerCase()
.includes(search)



);






displayClients(filtered);



});









loadClients();





</script>






</body>

</html>
