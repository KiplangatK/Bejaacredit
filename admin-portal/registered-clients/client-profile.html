<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>
Bejja Credit | Client Profile
</title>


<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">


<style>


body{

background:#f4f6f9;

}



.sidebar{

width:250px;
height:100vh;
position:fixed;
background:#062b45;
color:white;

}



.sidebar h3{

padding:20px;
color:#28a745;

}



.sidebar a{

display:block;
padding:14px 20px;
color:white;
text-decoration:none;

}



.sidebar a:hover{

background:#0b466b;

}



.main{

margin-left:250px;
padding:30px;

}



.card{

border:none;
border-radius:15px;
margin-bottom:20px;

}



.profile-photo{

width:130px;
height:130px;
border-radius:50%;
object-fit:cover;

}



.document{

width:100%;
height:250px;
object-fit:cover;
border-radius:10px;

}



.title{

color:#062b45;
font-weight:bold;

}


</style>


</head>


<body>



<div class="sidebar">


<h3>
Bejja Credit
</h3>


<a href="admin-dashboard.html">
Dashboard
</a>


<a href="registered-clients.html">
Registered Clients
</a>


<a href="active-loans.html">
Active Loans
</a>


<a href="loan-applications.html">
Loan Applications
</a>


</div>





<div class="main">


<div class="d-flex justify-content-between align-items-center">


<h2>
Client Profile
</h2>


<a href="registered-clients.html"
class="btn btn-secondary">

Back

</a>


</div>





<div id="clientProfile">


</div>





</div>





<script src="assets/js/database.js"></script>


<script>



let clientID =
localStorage.getItem("selectedClient");



function loadClient(){



let client =
DB.getClientById(clientID);



if(!client){

document.getElementById("clientProfile").innerHTML=

`
<div class="alert alert-danger">

Client not found

</div>

`;

return;

}




let photo =
client.profilePhoto
?
client.profilePhoto
:
"assets/images/avatar.png";





document.getElementById("clientProfile").innerHTML=



`

<div class="card p-4">


<div class="row align-items-center">


<div class="col-md-3 text-center">


<img src="${photo}"
class="profile-photo">


</div>



<div class="col-md-9">


<h2>

${client.fullname}

</h2>


<span class="badge bg-success">

Active Client

</span>


<p class="mt-3">

Registered Date:
<b>${client.date || "N/A"}</b>

</p>


</div>



</div>


</div>








<div class="card p-4">


<h4 class="title">

Personal Information

</h4>


<hr>


<div class="row">


<div class="col-md-6">


<p>
<b>Full Name:</b>
${client.fullname}
</p>


<p>
<b>National ID:</b>
${client.nationalID}
</p>


</div>



<div class="col-md-6">


<p>
<b>Date Registered:</b>
${client.date || "N/A"}
</p>


</div>


</div>


</div>









<div class="card p-4">


<h4 class="title">

Contact Information

</h4>


<hr>



<div class="row">


<div class="col-md-6">


<p>
<b>Phone:</b>
${client.phone}
</p>


<p>
<b>Email:</b>
${client.email}
</p>


</div>



<div class="col-md-6">


<p>
<b>County:</b>
${client.county}
</p>


<p>
<b>Address:</b>
${client.address}
</p>


</div>


</div>


</div>








<div class="card p-4">


<h4 class="title">

Employment Information

</h4>


<hr>


<div class="row">


<div class="col-md-6">


<p>

<b>Occupation:</b>

${client.occupation}

</p>


<p>

<b>Employer:</b>

${client.employer}

</p>


</div>




<div class="col-md-6">


<p>

<b>Monthly Income:</b>

KES ${Number(client.monthlyIncome).toLocaleString()}

</p>


</div>


</div>


</div>








<div class="card p-4">


<h4 class="title">

Identification Documents

</h4>


<hr>


<div class="row">


<div class="col-md-6">


<h6>ID Front</h6>


<img src="${client.idFront}"
class="document">


</div>



<div class="col-md-6">


<h6>ID Back</h6>


<img src="${client.idBack}"
class="document">


</div>



</div>


</div>








<div class="card p-4">


<h4 class="title">

Loan Summary

</h4>


<hr>


<div class="row text-center">


<div class="col-md-4">

<h3>0</h3>

<p>Total Loans</p>

</div>



<div class="col-md-4">

<h3>
KES 0
</h3>

<p>Total Borrowed</p>

</div>



<div class="col-md-4">

<h3>
KES 0
</h3>

<p>Outstanding</p>

</div>



</div>


</div>







<div>


<button class="btn btn-success">

Create Loan

</button>


<button class="btn btn-warning">

Edit Client

</button>


<button class="btn btn-danger">

Delete Client

</button>


</div>


`;



}


loadClient();


</script>


</body>

</html>
