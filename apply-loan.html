<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Apply Loan | Bejja Loan Credit</title>


<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" rel="stylesheet">


<style>

body{
    font-family:Poppins,sans-serif;
    background:#f4f7fb;
}


/* Sidebar */

.sidebar{

height:100vh;
width:260px;
position:fixed;
background:linear-gradient(180deg,#0F4C81,#2563EB);
color:white;
padding:25px;

}


.sidebar a{

display:block;
color:white;
text-decoration:none;
padding:14px;
margin:8px 0;
border-radius:10px;

}


.sidebar a:hover{

background:rgba(255,255,255,.2);

}



/* Main */

.main{

margin-left:260px;
padding:30px;

}


.card{

border:none;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,.08);

}


.form-control{

height:48px;
border-radius:12px;

}


textarea.form-control{

height:120px;

}


.section-title{

color:#0F4C81;
font-weight:700;

}


.btn-submit{

background:#198754;
color:white;
height:50px;
border-radius:12px;
font-weight:bold;

}


</style>

</head>


<body>


<!-- SIDEBAR -->


<div class="sidebar">


<h3>

<i class="fa-solid fa-building-columns"></i>

Bejja Credit

</h3>


<hr>


<a href="client-dashboard.html">

<i class="fa fa-home"></i>
Dashboard

</a>



<a href="apply-loan.html">

<i class="fa fa-money-bill"></i>
Apply Loan

</a>



<a href="my-loan.html">

<i class="fa fa-file"></i>
My Loan

</a>



<a href="profile.html">

<i class="fa fa-user"></i>
Profile

</a>



<a href="client-login.html">

<i class="fa fa-sign-out"></i>
Logout

</a>


</div>





<div class="main">


<div class="card p-4">


<h3 class="mb-4">

<i class="fa fa-file-signature"></i>

Loan Application

</h3>




<form>



<!-- CLIENT DETAILS -->


<h5 class="section-title">

Applicant Details

</h5>


<p class="text-muted">

Details are taken from your registered account.

</p>



<div class="row">


<div class="col-md-6 mb-3">

<label>Full Name</label>

<input class="form-control" value="Registered Client Name" readonly>

</div>



<div class="col-md-6 mb-3">

<label>Phone Number</label>

<input class="form-control" value="Registered Phone Number" readonly>

</div>



<div class="col-md-6 mb-3">

<label>National ID Number</label>

<input class="form-control" value="Registered ID Number" readonly>

</div>



<div class="col-md-6 mb-3">

<label>Occupation / Business</label>

<input class="form-control" value="Registered Occupation" readonly>

</div>


</div>





<hr>



<!-- LOAN DETAILS -->


<h5 class="section-title">

Loan Details

</h5>



<div class="row">


<div class="col-md-4 mb-3">


<label>Loan Amount (KES)</label>


<input 

type="number"

id="loanAmount"

class="form-control"

placeholder="Enter amount"

oninput="calculateInterest()"

required>


</div>



<div class="col-md-4 mb-3">


<label>Interest Rate</label>


<input 

class="form-control"

value="20%"

readonly>


</div>




<div class="col-md-4 mb-3">


<label>Monthly Interest</label>


<input

id="interestAmount"

class="form-control"

readonly>


</div>


</div>





<div class="mb-3">


<label>

Reason for Loan Application

</label>


<textarea

class="form-control"

placeholder="Explain why you need this loan"

required></textarea>


</div>





<hr>




<!-- GUARANTOR ONE -->


<h5 class="section-title">

Guarantor 1 Details

</h5>


<div class="row">


<div class="col-md-6 mb-3">

<input class="form-control" placeholder="Full Name" required>

</div>


<div class="col-md-6 mb-3">

<input class="form-control" placeholder="Phone Number" required>

</div>


<div class="col-md-6 mb-3">

<input class="form-control" placeholder="National ID Number" required>

</div>


<div class="col-md-6 mb-3">

<input class="form-control" placeholder="Relationship" required>

</div>


<div class="col-md-6 mb-3">

<input class="form-control" placeholder="Occupation" required>

</div>


<div class="col-md-6 mb-3">

<input class="form-control" placeholder="Address" required>

</div>


<div class="col-md-12 mb-3">


<label>

Upload Guarantor 1 ID Picture

</label>


<input 

type="file"

class="form-control"

required>


</div>


</div>





<hr>





<!-- GUARANTOR TWO -->


<h5 class="section-title">

Guarantor 2 Details

</h5>


<div class="row">


<div class="col-md-6 mb-3">

<input class="form-control" placeholder="Full Name" required>

</div>


<div class="col-md-6 mb-3">

<input class="form-control" placeholder="Phone Number" required>

</div>


<div class="col-md-6 mb-3">

<input class="form-control" placeholder="National ID Number" required>

</div>


<div class="col-md-6 mb-3">

<input class="form-control" placeholder="Relationship" required>

</div>


<div class="col-md-6 mb-3">

<input class="form-control" placeholder="Occupation" required>

</div>


<div class="col-md-6 mb-3">

<input class="form-control" placeholder="Address" required>

</div>



<div class="col-md-12 mb-3">


<label>

Upload Guarantor 2 ID Picture

</label>


<input 

type="file"

class="form-control"

required>


</div>


</div>






<hr>




<div class="form-check mb-3">


<input 

class="form-check-input"

type="checkbox"

required>


<label>

I agree that approved loans attract 20% monthly interest.

</label>


</div>




<button class="btn btn-submit w-100">

Submit Loan Application

</button>



</form>


</div>


</div>






<script>


function calculateInterest(){


let amount=document.getElementById("loanAmount").value;


let interest=amount * 0.20;



document.getElementById("interestAmount").value =

interest.toLocaleString();


}



</script>




</body>

</html>
