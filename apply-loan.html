<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Apply Loan | Bejja Loan Credit</title>


<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">


<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" rel="stylesheet">



<style>

body{

background:#f4f7fb;

font-family:'Poppins',sans-serif;

padding:30px;

}



.loan-card{

max-width:800px;

margin:auto;

background:white;

padding:35px;

border-radius:20px;

box-shadow:0 15px 35px rgba(0,0,0,.1);

}



.form-control,
.form-select{

height:48px;

border-radius:12px;

}


textarea.form-control{

height:100px;

}



.title{

color:#0F4C81;

font-weight:700;

}



</style>


</head>



<body>




<div class="card loan-card">



<h2 class="title text-center">

<i class="fa-solid fa-money-bill-transfer"></i>

Loan Application

</h2>


<hr>





<h5 class="text-primary">

Applicant Details

</h5>




<div class="row">



<div class="col-md-6 mb-3">

<label>Full Name</label>

<input id="fullname"
class="form-control"
readonly>

</div>





<div class="col-md-6 mb-3">

<label>Phone Number</label>

<input id="phone"
class="form-control"
readonly>

</div>





<div class="col-md-6 mb-3">

<label>National ID</label>

<input id="nationalID"
class="form-control"
readonly>

</div>





<div class="col-md-6 mb-3">

<label>Occupation</label>

<input id="occupation"
class="form-control"
readonly>

</div>



</div>








<hr>





<h5 class="text-primary">

Loan Details

</h5>





<div class="mb-3">

<label>

Loan Amount (KES)

</label>


<input

type="number"

id="loanAmount"

class="form-control"

placeholder="Enter amount required"

onkeyup="calculateInterest()"

required>


</div>






<div class="mb-3">


<label>

Monthly Interest (20%)

</label>


<input

id="interest"

class="form-control"

readonly>


</div>







<div class="mb-3">


<label>

Reason for Application

</label>


<textarea

id="reason"

class="form-control"

placeholder="Explain why you need the loan"

required></textarea>


</div>









<hr>







<h5 class="text-primary">

Guarantor One

</h5>





<div class="row">



<div class="col-md-6 mb-3">


<label>Name</label>


<input id="g1name"

class="form-control"

required>


</div>




<div class="col-md-6 mb-3">


<label>Phone</label>


<input id="g1phone"

class="form-control"

required>


</div>




<div class="col-md-12 mb-3">


<label>

Upload Guarantor 1 ID Picture

</label>


<input

type="file"

class="form-control"

required>


</div>


</div>








<hr>







<h5 class="text-primary">

Guarantor Two

</h5>





<div class="row">



<div class="col-md-6 mb-3">


<label>Name</label>


<input id="g2name"

class="form-control"

required>


</div>




<div class="col-md-6 mb-3">


<label>Phone</label>


<input id="g2phone"

class="form-control"

required>


</div>




<div class="col-md-12 mb-3">


<label>

Upload Guarantor 2 ID Picture

</label>


<input

type="file"

class="form-control"

required>


</div>


</div>







<button

onclick="submitLoan()"

class="btn btn-success w-100 btn-lg">


<i class="fa-solid fa-paper-plane"></i>

SUBMIT APPLICATION


</button>





</div>








<script>





// Load registered client


let client = JSON.parse(localStorage.getItem("clientData"));



if(client){


document.getElementById("fullname").value = client.fullname;


document.getElementById("phone").value = client.phone;


document.getElementById("nationalID").value = client.nationalID;


document.getElementById("occupation").value = client.occupation;


}

else{


alert("Please create an account first.");

window.location.href="register.html";


}







// Calculate 20% interest


function calculateInterest(){


let amount = Number(

document.getElementById("loanAmount").value

);



let interest = amount * 0.20;



document.getElementById("interest").value =

" KES " + interest;



}








function submitLoan(){





let amount = document.getElementById("loanAmount").value;



let interest = amount * 0.20;





let application = {


amount:amount,


interest:interest,


reason:
document.getElementById("reason").value,


status:"PENDING",


date:new Date().toLocaleDateString()



};





localStorage.setItem(

"loanApplication",

JSON.stringify(application)

);





alert(

"Loan application submitted successfully. Await approval."

);



window.location.href="client-dashboard.html";



}





</script>





</body>

</html>
