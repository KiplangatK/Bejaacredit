<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>Client Portal | Bejja Loan Credit</title>


<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">


<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" rel="stylesheet">



<style>


body{

background:linear-gradient(135deg,#0F4C81,#2563EB);

font-family:'Poppins',sans-serif;

min-height:100vh;

display:flex;

justify-content:center;

align-items:center;

}



.login-card{

width:430px;

border:none;

border-radius:20px;

box-shadow:0 20px 40px rgba(0,0,0,.25);

overflow:hidden;

}



.logo{

font-size:60px;

color:#0F4C81;

}



.form-control{

height:50px;

border-radius:12px;

}



.input-group-text{

background:#f8f9fa;

border-radius:12px 0 0 12px;

}



.btn-login{

height:50px;

border-radius:12px;

font-size:18px;

font-weight:600;

background:#198754;

border:none;

}



.btn-login:hover{

background:#157347;

}



.create-btn{

border-radius:50px;

padding:10px 25px;

}



#errorMessage{

display:none;

}



</style>


</head>



<body>





<div class="card login-card">


<div class="card-body p-5">





<div class="text-center mb-4">



<i class="fa-solid fa-building-columns logo"></i>



<h3 class="fw-bold mt-3">

BEJJA LOAN CREDIT

</h3>



<p class="text-muted">

Client Portal Login

</p>



</div>






<!-- ERROR MESSAGE -->


<div id="errorMessage"

class="alert alert-danger">

</div>








<form onsubmit="return loginClient(event)">





<div class="mb-3">


<label class="fw-semibold">

Phone Number

</label>



<div class="input-group">



<span class="input-group-text">

<i class="fa-solid fa-phone"></i>

</span>




<input

type="tel"

id="phone"

class="form-control"

placeholder="07XXXXXXXX"

required>



</div>


</div>








<div class="mb-3">


<label class="fw-semibold">

Password

</label>



<div class="input-group">



<span class="input-group-text">

<i class="fa-solid fa-lock"></i>

</span>




<input

type="password"

id="password"

class="form-control"

placeholder="Enter Password"

required>



</div>


</div>







<div class="text-end mb-4">


<a href="forgot-password.html">

Forgot Password?

</a>


</div>







<button 

type="submit"

class="btn btn-success w-100 btn-login">



<i class="fa-solid fa-right-to-bracket"></i>


LOGIN



</button>






</form>







<hr>








<div class="text-center">



<p>

Don't have an account?

</p>





<a 

href="register.html"

class="btn btn-outline-primary create-btn">



<i class="fa-solid fa-user-plus"></i>


CREATE NEW ACCOUNT



</a>



</div>






</div>


</div>









<script>


function loginClient(event){


event.preventDefault();




let enteredPhone = document.getElementById("phone").value;


let enteredPassword = document.getElementById("password").value;




let savedPhone = localStorage.getItem("clientPhone");


let savedPassword = localStorage.getItem("clientPassword");



let errorBox = document.getElementById("errorMessage");





// No account exists

if(savedPhone === null || savedPassword === null){


errorBox.innerHTML =
"Account not found. Please create an account first.";


errorBox.style.display="block";


return false;


}





// Phone check


if(enteredPhone !== savedPhone){


errorBox.innerHTML =
"Phone number is not registered.";


errorBox.style.display="block";


return false;


}






// Password check


if(enteredPassword !== savedPassword){


errorBox.innerHTML =
"Incorrect password. Please try again.";


errorBox.style.display="block";


return false;


}





// Successful login


localStorage.setItem("loggedIn","true");


window.location.href="client-dashboard.html";


return false;


}



</script>





</body>

</html>
