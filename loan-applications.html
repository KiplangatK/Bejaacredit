<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Loan Applications</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajaxexercise/font-awesome/6.6.0/css/all.min.css" rel="stylesheet">
<style>
body{background:#f4f7fb;font-family:Arial}
.sidebar{position:fixed;width:250px;height:100vh;background:#0F4C81;color:#fff;padding:20px}
.sidebar a{display:block;color:#fff;text-decoration:none;padding:10px}
.main{margin-left:250px;padding:25px}.panel{background:#fff;padding:20px;border-radius:12px;box-shadow:0 4px 12px rgba(0,0,0,.08)}
</style></head><body>
<div class="sidebar">
<h3>Bejja Admin</h3><hr>
<a href="admin-dashboard.html">Dashboard</a>
<a href="loan-applications.html">Loan Applications</a>
<a href="active-loans.html">Active Loans</a>
<a href="reports.html">Reports</a>
</div>
<div class="main">
<h2>Loan Applications</h2>
<div class="panel mb-3">
<div class="row">
<div class="col-md-6"><input id="search" class="form-control" placeholder="Search client..."></div>
<div class="col-md-3">
<select id="status" class="form-select">
<option value="all">All</option><option>Pending</option><option>Approved</option><option>Rejected</option>
</select></div></div></div>
<div class="panel">
<table class="table table-hover">
<thead><tr><th>Client</th><th>Phone</th><th>Amount</th><th>Period</th><th>Date</th><th>Status</th><th>Action</th></tr></thead>
<tbody id="rows"></tbody>
</table>
</div></div>
<script src="assets/js/database.js"></script>
<script>
function badge(s){return s==="Approved"?"success":s==="Rejected"?"danger":"warning";}
function load(){
 const data=(window.DB&&DB.getLoanApplications)?DB.getLoanApplications():[];
 const q=search.value.toLowerCase(), st=status.value;
 rows.innerHTML="";
 data.filter(a=>{
   return (st==="all"||a.status===st)&&((a.fullname||"").toLowerCase().includes(q)||(a.phone||"").includes(q));
 }).forEach(a=>{
 rows.innerHTML+=`<tr>
<td>${a.fullname||""}</td>
<td>${a.phone||""}</td>
<td>KES ${(a.amount||0).toLocaleString()}</td>
<td>${a.period||"-"}</td>
<td>${a.applicationDate||"-"}</td>
<td><span class="badge bg-${badge(a.status||"Pending")}">${a.status||"Pending"}</span></td>
<td><a class="btn btn-sm btn-primary" href="application-details.html?id=${a.id}">View</a></td>
</tr>`;
 });
 if(!rows.innerHTML) rows.innerHTML='<tr><td colspan="7" class="text-center">No applications found.</td></tr>';
}
search.oninput=load;status.onchange=load;load();
</script></body></html>
