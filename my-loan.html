<script>

let loan = localStorage.getItem("clientLoan");

let application = localStorage.getItem("loanApplication");



let currentLoan = null;



if(loan){

currentLoan = JSON.parse(loan);

}

else if(application){

currentLoan = JSON.parse(application);

}





if(currentLoan){


document.getElementById("loanAmount").innerHTML =
"KES " + currentLoan.amount;



document.getElementById("remainingPrincipal").innerHTML =
"KES " + 
(currentLoan.remaining || currentLoan.amount);



let remaining =
Number(currentLoan.remaining || currentLoan.amount);



document.getElementById("monthlyInterest").innerHTML =
"KES " + (remaining * 0.20);



document.getElementById("loanDate").innerHTML =
currentLoan.date || "-";



document.getElementById("dueDate").innerHTML =
currentLoan.dueDate || "Pending Approval";



document.getElementById("principalPaid").innerHTML =
"KES " + (currentLoan.paid || 0);



document.getElementById("status").innerHTML =
currentLoan.status;



if(currentLoan.status==="ACTIVE"){

document.getElementById("status").className =
"badge bg-success";

}


if(currentLoan.status==="PENDING"){

document.getElementById("status").className =
"badge bg-warning";

}


if(currentLoan.status==="REJECTED"){

document.getElementById("status").className =
"badge bg-danger";

}



}

else{


document.getElementById("loanAmount").innerHTML =
"No Loan";


document.getElementById("remainingPrincipal").innerHTML =
"KES 0";


document.getElementById("monthlyInterest").innerHTML =
"KES 0";



document.getElementById("status").innerHTML =
"NO ACTIVE LOAN";



}


</script>
