<!DOCTYPE html>

body{

}



.sidebar{

.main{

}



.card{

border:none;

box-shadow:0 10px 25px rgba(0,0,0,.08);

}



.form-control{

height:48px;
border-radius:12px;

}



.profile-icon{

<h3>

<i class="fa-solid fa-building-columns"></i>

<a href="client-dashboard.html">

Dashboard

</a>



<a href="apply-loan.html">

<a href="transaction-history.html">

Client Profile

</h3>

<h5 class="text-primary">

Personal Information

</h5>




<div class="row mt-3">



<div class="col-md-6 mb-3">


<label>Full Name</label>


<input 

class="form-control"

value="Registered Client Name"

readonly>


</div>





<div class="col-md-6 mb-3">


<label>Phone Number</label>


<input 

class="form-control"

value="07XXXXXXXX"

readonly>


</div>





<div class="col-md-6 mb-3">


<label>National ID Number</label>


<input 

class="form-control"

value="XXXXXXXX"

readonly>


</div>





<div class="col-md-6 mb-3">


<label>Date of Birth</label>


<input 

class="form-control"

value="01 January 2000"

readonly>


</div>





<div class="col-md-6 mb-3">


<label>Gender</label>


<input 

class="form-control"

value="Male"

readonly>


</div>





<div class="col-md-6 mb-3">


<label>Occupation / Business</label>


<input 

class="form-control"

value="Business Owner"

readonly>


</div>





<div class="col-md-12 mb-3">


<label>Residential Address</label>


<input 

class="form-control"

value="Registered Address"

readonly>


</div>



</div>

Account Information

</h5>



<div class="row">


<div class="col-md-6 mb-3">


<label>Account Status</label>


<input 

class="form-control"

value="Active"

readonly>


</div>



<div class="col-md-6 mb-3">


<label>Registration Date</label>


<input 

class="form-control"

value="20 July 2026"

readonly>
