<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Bejja Loan Credit - Register</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body{font-family:Arial,sans-serif;background:linear-gradient(135deg,#0F4C81,#2563EB);padding:40px}
.card{max-width:900px;margin:auto;border-radius:18px}
.step{display:none}.step.active{display:block}
</style>
</head>
<body>
<div class="card shadow p-4">
<h2 class="text-center">Create Client Account</h2>
<div class="progress mb-4"><div id="bar" class="progress-bar" style="width:33%">Step 1 of 3</div></div>

<form id="regForm">
<div class="step active" id="s1">
<h4>Personal Information</h4>
<div class="row">
<div class="col-md-6 mb-3"><label>First Name</label><input required class="form-control"></div>
<div class="col-md-6 mb-3"><label>Last Name</label><input required class="form-control"></div>
<div class="col-md-6 mb-3"><label>ID Number</label><input required class="form-control"></div>
<div class="col-md-6 mb-3"><label>Date of Birth</label><input type="date" required class="form-control"></div>
</div>
<div class="text-end"><button type="button" class="btn btn-primary" onclick="next()">Next</button></div>
</div>

<div class="step" id="s2">
<h4>Contact Information</h4>
<div class="row">
<div class="col-md-6 mb-3"><label>Phone</label><input id="phone" required class="form-control" placeholder="07XXXXXXXX"></div>
<div class="col-md-6 mb-3"><label>Email</label><input type="email" class="form-control"></div>
<div class="col-md-6 mb-3"><label>County</label><input class="form-control"></div>
<div class="col-md-6 mb-3"><label>Town</label><input class="form-control"></div>
</div>
<div class="d-flex justify-content-between"><button type="button" class="btn btn-secondary" onclick="prev()">Previous</button><button type="button" class="btn btn-primary" onclick="next()">Next</button></div>
</div>

<div class="step" id="s3">
<h4>Security</h4>
<div class="mb-3"><label>Password</label><input id="p1" type="password" required class="form-control"></div>
<div class="mb-3"><label>Confirm Password</label><input id="p2" type="password" required class="form-control"></div>
<div class="form-check mb-3"><input required class="form-check-input" type="checkbox" id="t"><label class="form-check-label" for="t">I agree to Terms</label></div>
<div class="d-flex justify-content-between"><button type="button" class="btn btn-secondary" onclick="prev()">Previous</button><button class="btn btn-success">Create Account</button></div>
</div>
</form>
<p class="text-center mt-3">Already have an account? <a href="client-portal.html">Login</a></p>
</div>
<script>
let i=0;
const steps=[...document.querySelectorAll('.step')];
const bar=document.getElementById('bar');
function show(){steps.forEach((s,n)=>s.classList.toggle('active',n===i));bar.style.width=((i+1)*33)+'%';bar.textContent='Step '+(i+1)+' of 3';}
function next(){
 if(i===0){i=1;show();return;}
 if(i===1){
   const ph=document.getElementById('phone').value;
   if(!/^(07|01)\d{8}$/.test(ph)){alert('Enter valid Kenyan phone');return;}
   i=2;show();
 }
}
function prev(){if(i>0){i--;show();}}
document.getElementById('regForm').onsubmit=(e)=>{
 e.preventDefault();
 if(document.getElementById('p1').value!==document.getElementById('p2').value){alert('Passwords do not match');return;}
 alert('Account created successfully! (Backend integration pending)');
}
</script>
</body></html>
