<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Create Account | Bejja Loan Credit</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" rel="stylesheet">

<style>

body{

background:linear-gradient(135deg,#0F4C81,#2563EB);

font-family:Poppins,sans-serif;

min-height:100vh;

padding:30px;

}

.card{

max-width:900px;

margin:auto;

border:none;

border-radius:20px;

box-shadow:0 20px 40px rgba(0,0,0,.25);

}

.logo{

font-size:60px;

color:#0F4C81;

}

.form-control,.form-select{

height:50px;

border-radius:12px;

}

.btn-success{

height:50px;

border-radius:12px;

font-size:18px;

font-weight:600;

}

.alert{

display:none;

}

</style>

</head>

<body>

<div class="card">

<div class="card-body p-5">

<div class="text-center mb-4">

<i class="fa-solid fa-building-columns logo"></i>

<h2 class="fw-bold mt-3">

BEJJA LOAN CREDIT

</h2>

<p class="text-muted">

Create Client Account

</p>

</div>

<div class="alert alert-danger" id="errorBox"></div>

<div class="alert alert-success" id="successBox"></div>

<form id="registerForm">

<div class="row">

<div class="col-md-6 mb-3">

<label>Full Name</label>

<input
type="text"
class="form-control"
id="fullname"
required>

</div>

<div class="col-md-6 mb-3">

<label>National ID</label>

<input
type="text"
class="form-control"
id="nationalID"
required>

</div>

<div class="col-md-6 mb-3">

<label>Phone Number</label>

<input
type="tel"
class="form-control"
id="phone"
placeholder="07XXXXXXXX"
required>

</div>

<div class="col-md-6 mb-3">

<label>Email</label>

<input
type="email"
class="form-control"
id="email">

</div>

<div class="col-md-6 mb-3">

<label>Occupation</label>

<input
type="text"
class="form-control"
id="occupation"
required>

</div>

<div class="col-md-6 mb-3">

<label>Employer</label>

<input
type="text"
class="form-control"
id="employer">

</div>

<div class="col-md-6 mb-3">

<label>Monthly Income</label>

<input
type="number"
class="form-control"
id="income"
required>

</div>

<div class="col-md-6 mb-3">

<label>County</label>

<input
type="text"
class="form-control"
id="county"
required>

</div>

<div class="col-12 mb-3">

<label>Physical Address</label>

<textarea
class="form-control"
id="address"
rows="3"
required></textarea>

</div>

<div class="col-md-6 mb-3">

<label>Password</label>

<input
type="password"
class="form-control"
id="password"
required>

</div>

<div class="col-md-6 mb-4">

<label>Confirm Password</label>

<input
type="password"
class="form-control"
id="confirmPassword"
required>

</div>

</div>

<button
type="submit"
class="btn btn-success w-100">

<i class="fa fa-user-plus"></i>

Create Account

</button>

</form>

<div class="text-center mt-4">

Already have an account?

<a href="client-portal.html">

Login Here

</a>

</div>

</div>

</div>

<script src="assets/js/database.js"></script>
<script src="assets/js/auth.js"></script>

<!-- PART 2 JavaScript goes here -->
<script>
/*====================================================
    BEJJA LOAN CREDIT
    REGISTER CLIENT
=====================================================*/

document.getElementById("registerForm").addEventListener("submit", function (e) {

    e.preventDefault();

    const errorBox = document.getElementById("errorBox");
    const successBox = document.getElementById("successBox");

    errorBox.style.display = "none";
    successBox.style.display = "none";

    // Read form values
    const fullname = document.getElementById("fullname").value.trim();
    const nationalID = document.getElementById("nationalID").value.trim();
    const phone = document.getElementById("phone").value.trim();
    const email = document.getElementById("email").value.trim();
    const occupation = document.getElementById("occupation").value.trim();
    const employer = document.getElementById("employer").value.trim();
    const income = document.getElementById("income").value.trim();
    const county = document.getElementById("county").value.trim();
    const address = document.getElementById("address").value.trim();
    const password = document.getElementById("password").value;
    const confirmPassword = document.getElementById("confirmPassword").value;

    // Password check
    if (password !== confirmPassword) {

        errorBox.innerHTML = "Passwords do not match.";

        errorBox.style.display = "block";

        return;

    }

    // Phone format
    if (!/^07\d{8}$/.test(phone)) {

        errorBox.innerHTML = "Enter a valid phone number (07XXXXXXXX).";

        errorBox.style.display = "block";

        return;

    }

    // National ID validation
    if (nationalID.length < 6) {

        errorBox.innerHTML = "Invalid National ID.";

        errorBox.style.display = "block";

        return;

    }

    // Create client object
    const client = {

        fullname: fullname,

        nationalID: nationalID,

        phone: phone,

        email: email,

        occupation: occupation,

        employer: employer,

        monthlyIncome: income,

        county: county,

        address: address,

        password: password

    };

    // Register using AUTH
    const result = AUTH.registerClient(client);

    if (!result.success) {

        errorBox.innerHTML = result.message;

        errorBox.style.display = "block";

        return;

    }

    // Success
    successBox.style.display = "block";

    successBox.innerHTML = `
        <h4 class="text-success">
            <i class="fa fa-check-circle"></i>
            Congratulations!
        </h4>

        <p>Your account has been created successfully.</p>

        <a href="client-portal.html"
           class="btn btn-success">

            Login Now

        </a>
    `;

    document.getElementById("registerForm").reset();

});
</script>
</body>

</html>
