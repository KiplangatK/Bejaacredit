<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Create Account | Bejja Loan Credit</title>


<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">


<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" rel="stylesheet">



<style>

body{

background:linear-gradient(135deg,#0F4C81,#2563EB);

font-family:'Poppins',sans-serif;

min-height:100vh;

padding:40px 0;

}



.register-card,
.success-card{

width:650px;

border:none;

border-radius:20px;

box-shadow:0 20px 40px rgba(0,0,0,.25);

}



.logo{

font-size:60px;

color:#0F4C81;

}



.form-control,
.form-select{

height:48px;

border-radius:12px;

}



textarea.form-control{

height:100px;

}



.btn-register{

height:50px;

border-radius:12px;

font-size:18px;

font-weight:600;

}



.success-card{

display:none;

}



.success-icon{

font-size:80px;

color:#198754;

}


</style>

</head>



<body>




<div class="container d-flex justify-content-center">






<!-- REGISTER BOX -->


<div class="card register-card" id="registerBox">


<div class="card-body p-5">





<div class="text-center mb-4">


<i class="fa-solid fa-building-columns logo"></i>


<h3 class="fw-bold mt-3">

BEJJA LOAN CREDIT

</h3>


<p class="text-muted">

Create Client Account

</p>


</div>






<form id="registerForm" onsubmit="createAccount(event)">






<h5 class="text-primary">

Personal Details

</h5>






<div class="row">






<div class="col-md-6 mb-3">


<label class="fw-semibold">

Full Name

</label>


<input

id="fullname"

type="text"

class="form-control"

required>


</div>







<div class="col-md-6 mb-3">


<label class="fw-semibold">

Phone Number

</label>


<input

id="phone"

type="tel"

class="form-control"

placeholder="07XXXXXXXX"

required>


</div>







<div class="col-md-6 mb-3">


<label class="fw-semibold">

National ID Number

</label>


<input

id="nationalID"

type="number"

class="form-control"

required>


</div>







<div class="col-md-6 mb-3">


<label class="fw-semibold">

Date of Birth

</label>


<input

id="dob"

type="date"

class="form-control"

required>


</div>







<div class="col-md-6 mb-3">


<label>

Gender

</label>


<select

id="gender"

class="form-select"

required>


<option value="">Select Gender</option>

<option>Male</option>

<option>Female</option>


</select>


</div>







<div class="col-md-6 mb-3">


<label>

Occupation / Business

</label>


<input

id="occupation"

type="text"

class="form-control"

required>


</div>








<div class="col-md-12 mb-3">


<label>

Residential Address

</label>


<textarea

id="address"

class="form-control"

required></textarea>


</div>






</div>









<hr>








<h5 class="text-primary">

Account Security

</h5>






<div class="row">






<div class="col-md-6 mb-3">


<label>

Password

</label>


<input

id="password"

type="password"

class="form-control"

required>


</div>








<div class="col-md-6 mb-3">


<label>

Confirm Password

</label>


<input

id="confirmPassword"

type="password"

class="form-control"

required>


</div>






</div>









<hr>








<h5 class="text-primary">

Documents

</h5>







<div class="mb-3">


<label>

Upload National ID Picture

</label>


<input

type="file"

class="form-control"

required>


</div>







<div class="mb-3">


<label>

Upload Passport Photo

</label>


<input

type="file"

class="form-control"

required>


</div>







<div class="form-check mb-4">


<input

class="form-check-input"

type="checkbox"

required>


<label>

I agree to Bejja Loan Credit terms and conditions.

</label>


</div>






<button

class="btn btn-success w-100 btn-register"

type="submit">


<i class="fa-solid fa-user-plus"></i>

CREATE ACCOUNT


</button>







</form>






</div>


</div>









<!-- SUCCESS MESSAGE -->



<div class="card success-card" id="successBox">


<div class="card-body p-5 text-center">



<i class="fa-solid fa-circle-check success-icon"></i>




<h2 class="fw-bold mt-4">

Congratulations!

</h2>





<h4>

Account Created Successfully

</h4>





<p class="text-muted">

Your Bejja Loan Credit account has been created successfully.

</p>







<a href="client-login.html"

class="btn btn-success rounded-pill px-5">


<i class="fa-solid fa-right-to-bracket"></i>

LOGIN NOW


</a>






</div>


</div>








</div>









<script>


function createAccount(event){


event.preventDefault();





let password=document.getElementById("password").value;


let confirmPassword=document.getElementById("confirmPassword").value;



if(password !== confirmPassword){


alert("Passwords do not match.");

return;


}





let clientData = {


fullname:
document.getElementById("fullname").value,


phone:
document.getElementById("phone").value,


nationalID:
document.getElementById("nationalID").value,


dob:
document.getElementById("dob").value,


gender:
document.getElementById("gender").value,


occupation:
document.getElementById("occupation").value,


address:
document.getElementById("address").value,


password:
password


};







localStorage.setItem(

"clientData",

JSON.stringify(clientData)

);





localStorage.setItem(

"clientPhone",

clientData.phone

);



localStorage.setItem(

"clientPassword",

clientData.password

);







document.getElementById("registerBox").style.display="none";


document.getElementById("successBox").style.display="block";




}



</script>






</body>

</html>
