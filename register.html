<script>


/* ================================
   IMAGE PREVIEW
================================ */


function previewImage(input,target){


const file=input.files[0];


if(file){


const reader=new FileReader();


reader.onload=function(e){


target.src=e.target.result;


target.style.display="block";


}


reader.readAsDataURL(file);


}


}



profilePhoto.onchange=function(){

previewImage(
this,
document.getElementById("profilePreview")
);

}


idFront.onchange=function(){

previewImage(
this,
document.getElementById("frontPreview")
);

}


idBack.onchange=function(){

previewImage(
this,
document.getElementById("backPreview")
);

}





/* ================================
   COMPRESS IMAGE
================================ */


function compressImage(file){


return new Promise(resolve=>{


const reader=new FileReader();


reader.onload=function(event){


const img=new Image();


img.onload=function(){


const canvas=document.createElement("canvas");


const max=800;


let width=img.width;

let height=img.height;



if(width>max){


height*=max/width;

width=max;


}



canvas.width=width;

canvas.height=height;



const ctx=canvas.getContext("2d");


ctx.drawImage(img,0,0,width,height);



resolve(
canvas.toDataURL(
"image/jpeg",
0.7
)
);



}



img.src=event.target.result;


}


reader.readAsDataURL(file);



});


}






/* ================================
   REGISTER CLIENT
================================ */



document.getElementById("registerForm")

.addEventListener("submit",async function(e){


e.preventDefault();



const errorBox=document.getElementById("errorBox");

const successBox=document.getElementById("successBox");



errorBox.style.display="none";

successBox.style.display="none";




const password=passwordInput=document.getElementById("password").value;

const confirmPassword=document.getElementById("confirmPassword").value;




if(password!==confirmPassword){


errorBox.innerHTML="Passwords do not match.";

errorBox.style.display="block";

return;


}




const phone=document.getElementById("phone").value.trim();




if(!/^07\d{8}$/.test(phone)){


errorBox.innerHTML="Invalid phone number format.";

errorBox.style.display="block";

return;


}





const profile=

await compressImage(
document.getElementById("profilePhoto").files[0]
);



const front=

await compressImage(
document.getElementById("idFront").files[0]
);



const back=

await compressImage(
document.getElementById("idBack").files[0]
);






const client={


fullname:
fullname.value,


nationalID:
nationalID.value,


phone:phone,


email:
email.value,


occupation:
occupation.value,


employer:
employer.value,


monthlyIncome:
income.value,


county:
county.value,


address:
address.value,



profilePhoto:
profile,


idFront:
front,


idBack:
back,



password:password



};







const result = AUTH.registerClient(client);

console.log("REGISTER RESULT:", result);
console.log("SAVED CLIENTS:", DB.getClients());

if(!result.success){


errorBox.innerHTML=result.message;

errorBox.style.display="block";

return;


}






successBox.innerHTML=`

<h4>

<i class="fa fa-check-circle"></i>

Congratulations!

</h4>


<p>

Account created successfully.

</p>


<a href="client-portal.html"

class="btn btn-success">

Login Now

</a>

`;



successBox.style.display="block";



this.reset();



});



</script>
