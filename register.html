<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Create Account | Bejja Loan Credit</title>


<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" rel="stylesheet">


<style>

body{

background:linear-gradient(135deg,#0F4C81,#2563EB);

font-family:Poppins,sans-serif;

min-height:100vh;

padding:40px 0;

}



.register-card{

width:650px;

border:none;

border-radius:20px;

box-shadow:0 20px 40px rgba(0,0,0,.25);

}



.logo{

font-size:60px;

color:#0F4C81;

}



.form-control,
.form-select{

height:48px;

border-radius:12px;

}



textarea.form-control{

height:100px;

}



.btn-register{

height:50px;

border-radius:12px;

font-size:18px;

font-weight:600;

}



</style>


</head>


<body>




<div class="container d-flex justify-content-center">



<div class="card register-card">



<div class="card-body p-5">



<div class="text-center mb-4">


<i class="fa-solid fa-building-columns logo"></i>


<h3 class="fw-bold mt-3">

BEJJA LOAN CREDIT

</h3>


<p class="text-muted">

Create Client Account

</p>


</div>





<form action="client-login.html">





<h5 class="text-primary">

Personal Details

</h5>



<div class="row">



<div class="col-md-6 mb-3">

<label>Full Name</label>

<input class="form-control" required>

</div>




<div class="col-md-6 mb-3">

<label>Phone Number</label>

<input 

type="tel"

class="form-control"

placeholder="07XXXXXXXX"

required>

</div>





<div class="col-md-6 mb-3">

<label>National ID Number</label>

<input class="form-control" required>

</div>





<div class="col-md-6 mb-3">

<label>Date of Birth</label>

<input 

type="date"

class="form-control"

required>

</div>





<div class="col-md-6 mb-3">

<label>Gender</label>


<select class="form-select">


<option>Select Gender</option>

<option>Male</option>

<option>Female</option>


</select>


</div>





<div class="col-md-6 mb-3">

<label>Occupation / Business</label>

<input class="form-control" required>

</div>





<div class="col-md-12 mb-3">

<label>Residential Address</label>

<textarea 

class="form-control"

required></textarea>

</div>




</div>





<hr>




<h5 class="text-primary">

Account Security

</h5>



<div class="row">



<div class="col-md-6 mb-3">

<label>Password</label>

<input 

type="password"

class="form-control"

required>

</div>




<div class="col-md-6 mb-3">

<label>Confirm Password</label>

<input 

type="password"

class="form-control"

required>

</div>



</div>





<hr>




<h5 class="text-primary">

Documents

</h5>




<div class="mb-3">


<label>

Upload National ID Picture

</label>


<input 

type="file"

class="form-control"

required>


</div>




<div class="mb-3">


<label>

Upload Passport Photo

</label>


<input 

type="file"

class="form-control">


</div>






<div class="form-check mb-4">


<input 

class="form-check-input"

type="checkbox"

required>


<label>

I agree to Bejja Loan Credit terms and conditions.

</label>


</div>





<button 

class="btn btn-success w-100 btn-register">


<i class="fa-solid fa-user-plus"></i>

Create Account


</button>




</form>





<hr>




<div class="text-center">


Already have an account?


<br>


<a href="client-login.html">

Login Here

</a>


</div>




</div>


</div>


</div>





</body>

</html>
