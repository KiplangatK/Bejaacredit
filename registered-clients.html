<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Registered Clients | Bejja Credit</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" rel="stylesheet">

<style>

body{
    background:#eef4ff;
    font-family:Segoe UI, sans-serif;
}

.header{
    background:#0F4C81;
    color:#fff;
    padding:20px 30px;
}

.card{
    border:none;
    border-radius:15px;
    box-shadow:0 5px 20px rgba(0,0,0,.08);
}

.table img{
    width:50px;
    height:50px;
    object-fit:cover;
    border-radius:50%;
}

.badge-active{
    background:#198754;
}

.search-box{
    max-width:350px;
}

.btn-primary{
    background:#0F4C81;
    border:none;
}

.btn-primary:hover{
    background:#09345a;
}

</style>

</head>

<body>

<div class="header">

<div class="container-fluid d-flex justify-content-between align-items-center">

<h2>
<i class="fa fa-users"></i>
Registered Clients
</h2>

<a href="dashboard.html" class="btn btn-light">
<i class="fa fa-arrow-left"></i>
Dashboard
</a>

</div>

</div>

<div class="container-fluid mt-4">

<div class="card">

<div class="card-body">

<div class="row mb-3">

<div class="col-md-6">

<h4>Total Clients:
<span id="totalClients">0</span>
</h4>

</div>

<div class="col-md-6 text-end">

<input
type="text"
class="form-control search-box ms-auto"
placeholder="Search client..."
id="searchBox">

</div>

</div>

<div class="table-responsive">

<table class="table table-hover align-middle">

<thead class="table-primary">

<tr>

<th>#</th>

<th>Photo</th>

<th>Full Name</th>

<th>Phone</th>

<th>National ID</th>

<th>County</th>

<th>Occupation</th>

<th>Status</th>

<th>Action</th>

</tr>

</thead>

<tbody id="clientsTable">

</tbody>

</table>

</div>

</div>

</div>

</div>

<script src="assets/js/database.js"></script>

<script>

let clients = DB.getClients();

function loadClients(list){

const tbody = document.getElementById("clientsTable");

tbody.innerHTML = "";

document.getElementById("totalClients").textContent = list.length;

if(list.length===0){

tbody.innerHTML=`
<tr>
<td colspan="9" class="text-center text-muted p-5">
<i class="fa fa-users fa-3x mb-3"></i><br>
No registered clients found.
</td>
</tr>
`;

return;

}

list.forEach((client,index)=>{

tbody.innerHTML += `

<tr>

<td>${index+1}</td>

<td>

<img src="${client.profilePhoto}" alt="">

</td>

<td>${client.fullname}</td>

<td>${client.phone}</td>

<td>${client.nationalID}</td>

<td>${client.county}</td>

<td>${client.occupation}</td>

<td>

<span class="badge badge-active">

${client.status}

</span>

</td>

<td>

<button
class="btn btn-primary btn-sm"
onclick="viewClient(${client.id})">

<i class="fa fa-eye"></i>

View Details

</button>

</td>

</tr>

`;

});

}

loadClients(clients);

document.getElementById("searchBox").addEventListener("keyup",function(){

const value=this.value.toLowerCase();

const filtered=clients.filter(c=>

c.fullname.toLowerCase().includes(value) ||

c.phone.includes(value) ||

c.nationalID.includes(value) ||

c.county.toLowerCase().includes(value)

);

loadClients(filtered);

});

function viewClient(id){

window.location.href="client-details.html?id="+id;

}

</script>

</body>
</html>
